version: "3.9"

services:

  app:
    build: .
    container_name: simple_messaging_app
    ports:
      - "4000:4000"
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - mysql
      - mongodb
      - apm-server

  mysql:
    image: mysql:8
    container_name: simple_messaging_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: simple_messaging
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:7
    container_name: simple_messaging_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongo_data:/data/db

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.12.2
    container_name: simple_messaging_apm
    ports:
      - "8200:8200"
    environment:
      - output.elasticsearch.enabled=false
      - apm-server.kibana.enabled=false

volumes:
  mysql_data:
  mongo_data: