<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --border: #e8e8e4;
      --accent: #1a1a1a;
      --muted-bg: #f0f0ee;
      --text: #1a1a1a;
      --muted: #9a9a94;
      --danger: #d93025;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOGIN ─────────────────────────────── */
    #login-wrap {
      width: 100%;
      max-width: 340px;
      padding: 24px;
      animation: fadeIn 0.3s ease both;
    }

    .brand {
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 36px;
      color: var(--text);
    }

    .brand span { color: var(--muted); }

    #login-status {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 18px;
      min-height: 16px;
      transition: color 0.2s;
    }

    #login-status.error { color: var(--danger); }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }

    .field input::placeholder { color: var(--muted); }
    .field input:focus { border-color: var(--accent); }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s;
    }

    .btn-login:hover { opacity: 0.82; }

    /* ── DASHBOARD ─────────────────────────── */
    #dashboard {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      background: var(--bg);
      animation: fadeIn 0.2s ease both;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 50px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .online-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-user {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .btn-out {
      font-size: 0.75rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: color 0.15s;
      padding: 0;
    }

    .btn-out:hover { color: var(--danger); }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }

    #chat-box::-webkit-scrollbar { width: 3px; }
    #chat-box::-webkit-scrollbar-thumb { background: var(--border); }

    #messages {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-width: 660px;
      margin: 0 auto;
    }

    .msg-item {
      display: flex;
      flex-direction: column;
      max-width: 65%;
      animation: msgIn 0.18s ease both;
    }

    .msg-item.sent { align-self: flex-end; align-items: flex-end; }
    .msg-item.recv { align-self: flex-start; align-items: flex-start; }

    .msg-name {
      font-size: 0.65rem;
      color: var(--muted);
      margin-bottom: 3px;
      padding: 0 2px;
    }

    .msg-bubble {
      padding: 9px 13px;
      border-radius: 13px;
      font-size: 0.875rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg-item.sent .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .msg-item.recv .msg-bubble {
      background: var(--muted-bg);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 10px 0 4px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    #chat-controls {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 660px;
      margin: 0 auto;
    }

    #message-input {
      flex: 1;
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }

    #message-input::placeholder { color: var(--muted); }
    #message-input:focus { border-color: var(--accent); }

    .btn-send {
      width: 36px;
      height: 36px;
      border-radius: 7px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .btn-send:hover { opacity: 0.8; }
    .btn-send svg { width: 14px; height: 14px; fill: #fff; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .topbar-user { display: none; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-wrap">
    <div class="brand">helio<span>.</span></div>
    <div id="login-status">Sign in to continue</div>
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="username" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="password" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="login()">Continue</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="topbar">
      <div class="topbar-left">
        helio
        <div class="online-dot"></div>
      </div>
      <div class="topbar-right">
        <span class="topbar-user" id="display-name"></span>
        <button class="btn-out" onclick="logout()">Sign out</button>
      </div>
    </div>

    <div id="chat-box">
      <ul id="messages"></ul>
    </div>

    <div id="chat-controls">
      <div class="input-row">
        <input type="text" id="message-input" placeholder="Message…" onkeydown="handleKey(event)">
        <button class="btn-send" onclick="sendMessage()" title="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    let socket;
    let pendingMessages = [];
    let retryLogoutCount = 0;

    document.addEventListener('DOMContentLoaded', () => {
      if ('Notification' in window && Notification.permission !== 'denied') {
        Notification.requestPermission();
      }

      ['username', 'password'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => {
          if (e.key === 'Enter') login();
        });
      });

      if (sessionStorage.getItem('jwtToken')) {
        initDashboard();
        setupWebSocket();
      }
    });

    function initDashboard() {
      const fullname = sessionStorage.getItem('fullname') || sessionStorage.getItem('username') || '';
      document.getElementById('display-name').textContent = fullname;
      showDashboard();
      fetchMessageHistory(); // fetch history langsung, tidak perlu nunggu WebSocket
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById('login-status');
      el.textContent = msg;
      el.className = isError ? 'error' : '';
    }

    function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) return setStatus('Please fill in all fields.', true);

      setStatus('Signing in…');

      fetch('/user/v1/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
        .then(r => r.json())
        .then(data => {
          if (data.message === 'success' && data.data.token) {
            sessionStorage.setItem('jwtToken', data.data.token);
            sessionStorage.setItem('refreshToken', data.data.refresh_token);
            sessionStorage.setItem('username', data.data.username);
            sessionStorage.setItem('fullname', data.data.full_name);
            initDashboard();
            setupWebSocket();
          } else {
            setStatus('Incorrect username or password.', true);
          }
        })
        .catch(() => setStatus('Connection error. Try again.', true));
    }

    function logout() {
      fetch('/user/v1/logout', {
        method: 'DELETE',
        headers: { 'Authorization': sessionStorage.getItem('jwtToken') }
      })
        .then(res => {
          if (res.status === 401) {
            retryLogoutCount++;
            if (retryLogoutCount <= 3) return refreshToken().then(() => logout());
            throw new Error('Max retries');
          }
          return res.json();
        })
        .then(data => {
          if (data.message === 'success') {
            ['jwtToken', 'refreshToken', 'username', 'fullname'].forEach(k => sessionStorage.removeItem(k));
            location.reload();
          }
        })
        .catch(() => alert('Logout failed.'));
    }

    function refreshToken() {
      return fetch('/user/v1/refresh-token', {
        method: 'POST',
        headers: { 'Authorization': sessionStorage.getItem('refreshToken') }
      })
        .then(r => r.json())
        .then(data => {
          if (data.message === 'success' && data.data.token) {
            sessionStorage.setItem('jwtToken', data.data.token);
          }
        });
    }

    function fetchMessageHistory() {
      fetch('/message/v1/history', {
        method: 'GET',
        headers: { 'Authorization': sessionStorage.getItem('jwtToken') }
      })
        .then(r => r.json())
        .then(data => {
          if (data.data && data.data.length) {
            addDivider('Earlier');
            data.data.forEach(msg => addMessageToChat(msg.from, msg.message));
            addDivider('Today');
          }
        })
        .catch(err => console.error('History error:', err));
    }

    function setupWebSocket() {
      const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      socket = new WebSocket(`${wsProto}//${location.host}/message/v1/send`);

      socket.onopen = () => {
        pendingMessages.forEach(m => socket.send(m));
        pendingMessages = [];
      };

      socket.onmessage = event => {
        const msg = JSON.parse(event.data);
        const myFullname = sessionStorage.getItem('fullname') || sessionStorage.getItem('username');

        // Bug fix: server echoes our own sent messages back.
        // Since we already render optimistically in sendMessage(),
        // we skip any incoming message whose sender is ourselves.
        if (msg.from === myFullname) return;

        showNotification(msg.from, msg.message);
        addMessageToChat(msg.from, msg.message);
      };

      socket.onclose = () => console.log('Disconnected');
      socket.onerror = err => console.error('WS error:', err);
    }

    function showNotification(title, body) {
      if (Notification.permission === 'granted') {
        const n = new Notification(title, { body });
        n.onclick = () => window.focus();
      }
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) sendMessage();
    }

    function sendMessage() {
      const input = document.getElementById('message-input');
      const message = input.value.trim();
      if (!message) return;

      const fullname = sessionStorage.getItem('fullname') || sessionStorage.getItem('username');
      const payload = JSON.stringify({ from: fullname, message });

      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(payload);
      } else {
        pendingMessages.push(payload);
      }

      // Render immediately — don't wait for server echo
      addMessageToChat(fullname, message, true);
      input.value = '';
    }

    function addDivider(label) {
      const li = document.createElement('li');
      li.className = 'divider';
      li.textContent = label;
      document.getElementById('messages').appendChild(li);
    }

    function addMessageToChat(from, message, isSelf = false) {
      const myFullname = sessionStorage.getItem('fullname') || sessionStorage.getItem('username');
      const self = isSelf || from === myFullname;

      const li = document.createElement('li');
      li.className = `msg-item ${self ? 'sent' : 'recv'}`;

      const name = document.createElement('div');
      name.className = 'msg-name';
      name.textContent = self ? 'You' : from;

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = message;

      li.appendChild(name);
      li.appendChild(bubble);
      document.getElementById('messages').appendChild(li);

      const box = document.getElementById('chat-box');
      box.scrollTop = box.scrollHeight;
    }

    function showDashboard() {
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('dashboard').style.display = 'flex';
    }
  </script>
</body>
</html>
